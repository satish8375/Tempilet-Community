name: Auto Update Template Index

on:
  push:
    branches:
      - main
    paths:
      - 'templates/**'
      - 'previews/**'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Validate JSON Files
        run: |
          echo "Checking JSON files..."
          shopt -s nullglob
          # IFS se filenames ke spaces handle honge
          IFS=$'\n'
          for file in templates/*.json; do
            echo "Validating $file"
            jq . "$file" > /dev/null || (echo "Error: $file is not a valid JSON" && exit 1)
          done
          echo "All JSON files are valid"

      - name: Regenerate templates.csv
        run: |
          echo "Generating templates.csv"
          echo "id,template_name,author_name,json_url,preview_url,tags" > templates.csv

          count=1
          repo_url="https://raw.githubusercontent.com/${{ github.repository }}/main"
          
          shopt -s nullglob
          IFS=$'\n'

          for file in templates/*.json; do
            filename=$(basename "$file")
            name_only="${filename%.*}"

            # Quotes add kiye hain taaki spaces se crash na ho
            template_name=$(jq -r '.name // empty' "$file")

            if [ -z "$template_name" ] || [ "$template_name" == "null" ]; then
              template_name="$name_only"
            fi

            author_name="Community"
            
            # Link mein space ko %20 se badla gaya hai taaki URL sahi rahe
            encoded_filename=$(echo "$filename" | sed 's/ /%20/g')
            encoded_name_only=$(echo "$name_only" | sed 's/ /%20/g')

            json_url="${repo_url}/templates/${encoded_filename}"
            preview_url="${repo_url}/previews/${encoded_name_only}.png"

            echo "$count,$template_name,$author_name,$json_url,$preview_url,General" >> templates.csv
            count=$((count + 1))
          done

          echo "templates.csv updated successfully"

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Tempilet-Bot"
          git config --global user.email "bot@tempilet.com"

          git add templates.csv

          if git diff --staged --quiet
          then
            echo "No changes to commit"
          else
            git commit -m "🤖 Auto-update templates index [skip ci]"
            git push
          fi
